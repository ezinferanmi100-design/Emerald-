<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --g1: #1a6b1a;
    --g2: #22a022;
    --g3: #2dc52d;
    --glight: #7de87d;
    --gpale: #e6f9e6;
    --dark: #0d1f0d;
    --text: #152415;
    --muted: #5a7a5a;
    --white: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    background: #111c11;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* subtle world-map dot grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(34,160,34,0.18) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .phone {
    width: 375px; height: 780px;
    background: var(--white);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 120px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06),
                inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    transition: all 0.55s cubic-bezier(0.77, 0, 0.175, 1);
    overflow: hidden;
  }
  .screen.hidden-left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
  .screen.hidden-right { transform: translateX(100%);  opacity: 0; pointer-events: none; }
  .screen.active       { transform: translateX(0);     opacity: 1; }

  /* ─── STATUS BAR ─── */
  .status-bar {
    height: 44px; padding: 12px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; position: relative; z-index: 5;
  }
  .s-time { font-size: 13px; font-weight: 600; }
  .s-time.light { color: white; }
  .s-time.dark  { color: var(--text); }
  .s-icons { display: flex; gap: 5px; align-items: center; }

  .notch {
    width: 110px; height: 26px;
    border-radius: 0 0 16px 16px;
    margin: 0 auto; flex-shrink: 0;
    position: relative; z-index: 10;
  }

  /* ─── EMERALD TREE SVG LOGO ─── */
  .emerald-logo {
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .emerald-logo svg { display: block; }
  .logo-wordmark {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  /* ════════ SCREEN 1: SPLASH ════════ */
  #screen-splash {
    background: linear-gradient(170deg, #0d2b0d 0%, #1a5c1a 45%, #1e8c1e 100%);
    align-items: center; justify-content: center;
  }

  /* world connection lines */
  .world-lines {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .world-lines svg { width: 100%; height: 100%; opacity: 0.12; }

  /* glowing orbs */
  .orb {
    position: absolute; border-radius: 50%;
    animation: orbFloat 6s ease-in-out infinite;
    pointer-events: none;
  }
  .orb1 { width: 180px; height: 180px; top: -50px; right: -50px;
    background: radial-gradient(circle, rgba(45,197,45,0.25) 0%, transparent 70%); animation-delay: 0s; }
  .orb2 { width: 140px; height: 140px; bottom: 80px; left: -40px;
    background: radial-gradient(circle, rgba(34,160,34,0.2) 0%, transparent 70%); animation-delay: 2s; }
  .orb3 { width: 80px; height: 80px; bottom: 200px; right: 30px;
    background: radial-gradient(circle, rgba(45,197,45,0.3) 0%, transparent 70%); animation-delay: 4s; }

  @keyframes orbFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-20px) scale(1.05); }
  }

  .splash-inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    animation: fadeUp 1s ease both;
  }
  @keyframes fadeUp {
    from { transform: translateY(24px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* connection dots around logo */
  .connect-dots {
    position: relative;
    margin-bottom: 4px;
  }
  .cdot {
    position: absolute;
    width: 7px; height: 7px;
    background: var(--glight);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(125,232,125,0.8);
    animation: dotPulse 2.5s ease-in-out infinite;
  }
  .cdot:nth-child(1) { top: 8px; left: -28px; animation-delay: 0s; }
  .cdot:nth-child(2) { top: 30px; right: -30px; animation-delay: 0.8s; }
  .cdot:nth-child(3) { bottom: 10px; left: 10px; animation-delay: 1.6s; }
  @keyframes dotPulse {
    0%,100% { transform: scale(1); opacity: 0.7; }
    50%      { transform: scale(1.6); opacity: 1; }
  }

  .splash-tagline {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 300;
    font-style: italic;
    margin-top: -4px;
  }

  /* connecting arc under tagline */
  .tag-arc {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(125,232,125,0.6), transparent);
    margin: 0 auto;
  }

  .splash-cta {
    margin-top: 52px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: 100%;
    padding: 0 48px;
  }

  .btn-glow {
    width: 100%;
    background: linear-gradient(135deg, #22a022, #1a6b1a);
    border: none; color: white;
    padding: 17px 32px;
    border-radius: 100px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600; letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 0 0 1px rgba(45,197,45,0.4), 0 12px 40px rgba(34,160,34,0.45);
    transition: all 0.3s;
  }
  .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 0 0 1px rgba(45,197,45,0.6), 0 16px 50px rgba(34,160,34,0.6); }

  .btn-ghost {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85);
    padding: 16px 32px;
    border-radius: 100px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(8px);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.14); }

  /* ════════ SCREEN 2: LOGIN ════════ */
  #screen-login { background: var(--white); }

  .login-hero {
    background: linear-gradient(155deg, #0d2b0d 0%, #1a6b1a 60%, #22a022 100%);
    padding: 8px 32px 40px;
    position: relative; overflow: hidden;
    flex-shrink: 0;
  }

  .lhero-deco1 {
    position: absolute; width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, rgba(45,197,45,0.15) 0%, transparent 65%);
    top: -80px; right: -60px; pointer-events: none;
  }
  .lhero-deco2 {
    position: absolute; width: 100px; height: 100px; border-radius: 50%;
    background: rgba(125,232,125,0.06);
    bottom: -30px; left: 10px; pointer-events: none;
  }

  .back-btn {
    background: rgba(255,255,255,0.13);
    border: none; border-radius: 12px;
    width: 38px; height: 38px;
    color: white; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    margin-bottom: 16px;
    transition: background 0.2s;
    position: relative; z-index: 2;
  }
  .back-btn:hover { background: rgba(255,255,255,0.22); }

  .back-btn-lt {
    background: rgba(26,107,26,0.1);
    border: none; border-radius: 12px;
    width: 38px; height: 38px;
    color: var(--g1); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .back-btn-lt:hover { background: rgba(26,107,26,0.18); }

  .login-hero-text { position: relative; z-index: 2; }
  .login-hello { font-size: 28px; font-family: 'Playfair Display', serif; font-weight: 700; color: white; line-height: 1.2; }
  .login-hello span { color: var(--glight); }
  .login-sub-text { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; }

  .login-body {
    flex: 1; overflow-y: auto;
    padding: 28px 28px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .field-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
  .field-input {
    width: 100%; border: 1.5px solid #d4e8d4;
    border-radius: 14px; padding: 14px 16px;
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    color: var(--text); outline: none;
    background: #f6fbf6;
    transition: all 0.2s;
  }
  .field-input:focus { border-color: var(--g2); background: white; box-shadow: 0 0 0 3px rgba(34,160,34,0.08); }

  .row-between { display: flex; justify-content: flex-end; }
  .link-text { font-size: 12px; color: var(--g1); font-weight: 500; cursor: pointer; }

  .btn-solid {
    width: 100%; background: linear-gradient(135deg, #22a022, #1a6b1a);
    border: none; color: white; padding: 17px;
    border-radius: 16px; font-size: 16px;
    font-family: 'DM Sans', sans-serif; font-weight: 600;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 0 8px 24px rgba(34,160,34,0.3);
  }
  .btn-solid:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(34,160,34,0.42); }

  .divider-or { display: flex; align-items: center; gap: 10px; color: #a0baa0; font-size: 12px; }
  .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: #d4e8d4; }

  .btn-bordered {
    width: 100%; background: white;
    border: 1.5px solid #c0dcc0; color: var(--g1);
    padding: 16px; border-radius: 16px;
    font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }
  .btn-bordered:hover { background: #f0fbf0; border-color: var(--g2); }

  .terms-note { text-align: center; font-size: 12px; color: #8aaa8a; line-height: 1.6; }
  .terms-note span { color: var(--g1); font-weight: 500; cursor: pointer; }

  /* ════════ SCREEN 3: GET STARTED ════════ */
  #screen-start { background: var(--gpale); }

  .start-top {
    padding: 12px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
    position: relative; z-index: 2;
  }

  .globe-section {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; margin: 8px 0 0;
  }

  /* animated globe */
  .globe-wrap {
    position: relative; width: 200px; height: 200px;
  }
  .globe-core {
    position: absolute; inset: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2dc52d 0%, #1a6b1a 55%, #0d2b0d 100%);
    box-shadow: 0 0 0 2px rgba(34,160,34,0.2), 0 20px 60px rgba(34,160,34,0.3),
                inset 0 -4px 12px rgba(0,0,0,0.3);
    overflow: hidden;
    animation: globeSpin 20s linear infinite;
  }
  @keyframes globeSpin {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(10deg); }
  }

  /* latitude/longitude lines on globe */
  .globe-core::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 14px, rgba(125,232,125,0.15) 14px, rgba(125,232,125,0.15) 15px),
      repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(125,232,125,0.12) 20px, rgba(125,232,125,0.12) 21px);
    border-radius: 50%;
  }
  .globe-core::after {
    content: '';
    position: absolute; top: 8px; left: 12px;
    width: 35px; height: 25px;
    background: rgba(125,232,125,0.25);
    border-radius: 50% 30% 40% 50%;
    box-shadow: 30px 20px 0 rgba(125,232,125,0.2), 55px 5px 0 rgba(125,232,125,0.18);
  }

  /* orbiting connection dots */
  .orbit-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px dashed rgba(34,160,34,0.25);
    animation: orbitSpin 8s linear infinite;
  }
  .orbit-ring.r2 { inset: -12px; animation-duration: 14s; animation-direction: reverse; border-style: solid; border-color: rgba(34,160,34,0.1); }
  .orbit-ring.r3 { inset: -28px; animation-duration: 20s; }

  @keyframes orbitSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .orbit-dot {
    position: absolute;
    width: 8px; height: 8px;
    background: var(--g3);
    border-radius: 50%;
    top: -4px; left: calc(50% - 4px);
    box-shadow: 0 0 8px var(--g3);
  }
  .orbit-dot2 {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--glight);
    border-radius: 50%;
    bottom: -3px; right: 10%;
    box-shadow: 0 0 6px var(--glight);
  }

  .tree-badge {
    position: absolute; bottom: 0; right: 0;
    width: 54px; height: 54px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(34,160,34,0.25);
  }

  .start-body {
    padding: 20px 28px 0;
    display: flex; flex-direction: column; gap: 12px;
  }

  .start-eyebrow {
    font-size: 11px; color: var(--g2); font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
  }

  .start-headline {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 900;
    color: var(--text); line-height: 1.15;
  }
  .start-headline em { color: var(--g2); font-style: normal; }

  .start-body-text {
    font-size: 13px; color: var(--muted); line-height: 1.7;
  }

  .feature-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .ftag {
    background: white; border: 1px solid #b8ddb8;
    border-radius: 100px; padding: 7px 13px;
    font-size: 11px; color: var(--g1); font-weight: 500;
    display: flex; align-items: center; gap: 5px;
    box-shadow: 0 2px 6px rgba(34,160,34,0.07
